<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Danh Sách Phim - Xô Phim</title>
  <style>
    /* RESET & CORE */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }

    /* NAVBAR ĐỒNG BỘ INDEX */
    .navbar { background: rgba(10, 10, 10, 0.95); height: 90px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    .logo-img { height: 40px; cursor: pointer; }
    .search-bar { flex: 1; max-width: 480px; margin: 0 40px; position: relative; }
    .search-input { width: 100%; padding: 12px 20px 12px 48px; border: none; border-radius: 30px; background: rgba(51, 51, 51, 0.7); color: #fff; font-size: 15px; }
    .search-input:focus { outline: none; box-shadow: 0 0 0 2px #E50914; }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #aaa; }
    .nav-menu { display: flex; align-items: center; gap: 24px; font-size: 15px; }
    .nav-item { color: #e5e5e5; transition: color 0.2s; cursor: pointer; text-decoration: none; }
    .nav-item:hover { color: #E50914; }

    /* DROPDOWN */
    .dropdown { position: relative; }
    .dropdown-toggle::after { content: '▼'; font-size: 8px; margin-left: 4px; }
    .dropdown-menu { position: absolute; top: 100%; left: -20px; background: rgba(10, 10, 10, 0.95); border: 1px solid #333; border-radius: 8px; padding: 20px; min-width: 420px; z-index: 999; display: none; }
    .dropdown:hover .dropdown-menu { display: block; }
    .dropdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .dropdown-item { color: #ccc; padding: 10px; border-radius: 6px; cursor: pointer; display: block; text-decoration: none; font-size: 14px; }
    .dropdown-item:hover { background: #E50914; color: #fff; }

    /* MAIN WRAPPER */
    .main-wrapper { padding: 130px 8% 60px; flex: 1; background: #0a0a0a; }
    .page-title { font-size: 2.2rem; font-weight: bold; color: #fff; border-left: 5px solid #E50914; padding-left: 15px; margin-bottom: 30px; text-transform: uppercase; }
    
    /* GRID PHIM NHIỀU HƠN */
    .ds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px 20px; }

    /* THẺ PHIM & HIỆU ỨNG SÁNG VIỀN */
    .design-card { display: flex; flex-direction: column; gap: 10px; cursor: pointer; position: relative; }
    .design-poster-wrap { position: relative; aspect-ratio: 2 / 3; border-radius: 10px; overflow: hidden; background: #1a1c20; transition: all 0.3s ease; }
    .design-poster { width: 100%; height: 100%; object-fit: cover; }
    .design-card:hover .design-poster-wrap { box-shadow: 0 0 0 2px #E50914, 0 0 25px rgba(229,9,20,0.8); transform: translateY(-5px); }
    
    .design-tags { position: absolute; bottom: 8px; left: 8px; display: flex; gap: 5px; }
    .d-tag { background: rgba(0,0,0,0.8); font-size: 10px; font-weight: bold; padding: 3px 6px; border-radius: 4px; border: 1px solid #E50914; color: #E50914; }
    .design-title { font-size: 1rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* PHÂN TRANG */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 50px; }
    .page-btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
    .page-btn:hover:not(:disabled) { background: #E50914; border-color: #E50914; }
    .page-btn:disabled { opacity: 0.3; }

    /* FOOTER ĐỒNG BỘ */
    .site-footer { background: #0a0a0a; padding: 60px 8% 40px; border-top: 1px solid #222; text-align: center; }
    .footer-badge { background: #E50914; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-bottom: 20px; display: inline-block; }
    .back-to-top { position: fixed; bottom: 40px; right: 40px; background: #fff; color: #000; width: 50px; height: 50px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 1000; border: none; }

    /* POP-UP HOVER (PHÓNG TỪ TÂM) */
    .hover-detail-card { position: absolute; width: 340px; background: #181818; border-radius: 10px; box-shadow: 0 20px 50px #000; z-index: 9999; overflow: hidden; pointer-events: none; opacity: 0; visibility: hidden; transform: scale(0.5); transition: 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: center center; }
    .hover-detail-card.show { opacity: 1; visibility: visible; transform: scale(1); pointer-events: auto; }
    .hdc-btn-play { background: #E50914; color: #fff; border: none; padding: 10px; border-radius: 4px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }

    @media (max-width: 768px) { .ds-grid { grid-template-columns: repeat(2, 1fr); } .hover-detail-card { display: none !important; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo-section"><img src="logo.png" class="logo-img" onclick="window.location.href='index.html'"></div>
    <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="searchInput" class="search-input" placeholder="Tìm kiếm phim..." /></div>
    <div class="nav-menu">
      <span class="nav-item" onclick="window.location.href='index.html'">Trang chủ</span>
      <div class="dropdown"><span class="dropdown-toggle nav-item">Thể loại</span><div class="dropdown-menu"><div class="dropdown-grid" id="the-loai-grid"></div></div></div>
      <div class="dropdown"><span class="dropdown-toggle nav-item">Quốc gia</span><div class="dropdown-menu"><div class="dropdown-grid" id="quoc-gia-grid"></div></div></div>
      <div class="dropdown"><span class="dropdown-toggle nav-item">Diễn viên</span><div class="dropdown-menu"><div class="dropdown-grid" id="dien-vien-grid"></div></div></div>
    </div>
    <a href="#" class="member-btn">Thành viên</a>
  </nav>

  <div class="main-wrapper">
    <h1 class="page-title" id="page-title">Danh sách phim</h1>
    <div class="ds-grid" id="movies-grid"></div>
    <div class="pagination">
      <button class="page-btn" id="prev-btn" disabled>« Trước</button>
      <span id="page-info">Trang 1</span>
      <button class="page-btn" id="next-btn" disabled>Sau »</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-badge">⭐ Hoàng Sa & Trường Sa là của Việt Nam!</div>
    <br><img src="logo.png" height="40"><br><br>
    <p>© 2026 Xô Phim - Phim hay mỗi ngày</p>
    <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  </footer>

  <div id="hover-detail-card" class="hover-detail-card">
    <img id="hdc-img" src="" style="width:100%; height:190px; object-fit:cover;">
    <div style="padding:15px;">
      <h3 id="hdc-title"></h3>
      <p id="hdc-meta" style="font-size:13px; color:#aaa; margin-top:5px;"></p>
      <button class="hdc-btn-play">▶ Xem ngay</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type') || 'danh-sach';
    const slug = urlParams.get('slug') || 'phim-moi-cap-nhat';
    let currentPage = parseInt(urlParams.get('page')) || 1;

    const getSafeUrl = (p) => !p ? 'https://placehold.co/240x360' : (p.startsWith('http') ? p : 'https://phimimg.com/' + p);

    // LOAD MENU DIỄN VIÊN
    const famousActors = ['Châu Tinh Trì', 'Thành Long', 'Ngô Kinh', 'Chân Tử Đan', 'Lý Liên Kiệt', 'Cổ Thiên Lạc'];
    famousActors.forEach(a => document.getElementById('dien-vien-grid').innerHTML += `<div class="dropdown-item" onclick="window.location.href='1danh-sach.html?type=tim-kiem&slug=${encodeURIComponent(a)}'">${a}</div>`);

    // LOAD THỂ LOẠI & QUỐC GIA
    fetch('https://phimapi.com/the-loai').then(r=>r.json()).then(data=>data.forEach(i=>document.getElementById('the-loai-grid').innerHTML += `<div class="dropdown-item" onclick="window.location.href='1danh-sach.html?type=the-loai&slug=${i.slug}'">${i.name}</div>`));
    fetch('https://phimapi.com/quoc-gia').then(r=>r.json()).then(data=>data.forEach(i=>document.getElementById('quoc-gia-grid').innerHTML += `<div class="dropdown-item" onclick="window.location.href='1danh-sach.html?type=quoc-gia&slug=${i.slug}'">${i.name}</div>`));

    // SEARCH ENTER
    document.getElementById('searchInput').onkeypress = (e) => {
      if(e.key === 'Enter' && e.target.value.trim()) window.location.href = `1danh-sach.html?type=tim-kiem&slug=${encodeURIComponent(e.target.value.trim())}`;
    };

    // CHÍNH: NẠP PHIM (HIỂN THỊ HẾT DỮ LIỆU TỪ API)
    function fetchMovies(page) {
      const grid = document.getElementById('movies-grid');
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;">Đang cào phim... 🍿</div>';

      let api = '';
      if(type === 'tim-kiem') api = `https://ophim1.com/v1/api/tim-kiem?keyword=${slug}`;
      else if(type === 'the-loai') api = `https://phimapi.com/v1/api/the-loai/${slug}?page=${page}`;
      else if(type === 'quoc-gia') api = `https://phimapi.com/v1/api/quoc-gia/${slug}?page=${page}`;
      else api = `https://phimapi.com/v1/api/danh-sach/${slug}?page=${page}`;

      fetch(api).then(r=>r.json()).then(data => {
        grid.innerHTML = '';
        const items = data.data?.items || data.items || [];
        document.getElementById('page-title').textContent = data.data?.titlePage || "Kết quả";
        
        items.forEach(m => {
          const img = getSafeUrl(m.poster_url || m.thumb_url);
          grid.innerHTML += `
            <div class="design-card hover-trigger" data-name="${m.name}" data-img="${img}" data-year="${m.year}">
              <div class="design-poster-wrap">
                <img src="${img}" class="design-poster" loading="lazy">
                <div class="design-tags"><span class="d-tag">${m.episode_current || 'Full'}</span></div>
              </div>
              <div class="design-title">${m.name}</div>
            </div>`;
        });

        const total = data.data?.params?.pagination?.totalPages || data.pagination?.totalPages || 1;
        document.getElementById('page-info').textContent = `Trang ${page} / ${total}`;
        document.getElementById('prev-btn').disabled = page <= 1;
        document.getElementById('next-btn').disabled = page >= total;
      });
    }

    document.getElementById('prev-btn').onclick = () => { currentPage--; fetchMovies(currentPage); };
    document.getElementById('next-btn').onclick = () => { currentPage++; fetchMovies(currentPage); };

    // HOVER LOGIC (0.8S)
    const hoverCard = document.getElementById('hover-detail-card');
    let hoverTimer;
    document.addEventListener('mouseover', (e) => {
      const t = e.target.closest('.hover-trigger');
      if(t) {
        hoverTimer = setTimeout(() => {
          document.getElementById('hdc-title').textContent = t.dataset.name;
          document.getElementById('hdc-img').src = t.dataset.img;
          document.getElementById('hdc-meta').textContent = t.dataset.year + " • Vietsub • Full HD";
          const r = t.getBoundingClientRect();
          hoverCard.style.top = (r.top + window.scrollY - 40) + 'px';
          hoverCard.style.left = (r.left + window.scrollX - 20) + 'px';
          hoverCard.classList.add('show');
        }, 800);
      }
    });
    document.addEventListener('mouseout', (e) => { if(e.target.closest('.hover-trigger')) clearTimeout(hoverTimer); });
    hoverCard.onmouseleave = () => hoverCard.classList.remove('show');

    fetchMovies(currentPage);
  </script>
</body>
</html>
